<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="./output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="p-8">
    <div class="container rounded w-6xl mx-auto px-10 py-10">
      <nav class="flex items-center justify-between">
        <div class="flex items-center">
            <h2 class="font-medium text-2xl">clima</h2>
        </div>
        <div class="flex gap-3 items-center relative">
            <input class="border text-sm rounded-lg px-2 py-2 focus:outline-1 border-[#e0e0e0]" type="text" placeholder="Search for city...">
            <div class="hidden w-54 previous-Search absolute top-[90%] left-[0%]"></div>
            <button id="search-btn" class="text-sm font-semibold py-2 px-3 border border-gray-300 rounded-xl hover:bg-gray-200 cursor-pointer ">Search</button>
            <button id="Temp-btn" class="text-sm font-semibold py-2 px-3 border border-gray-300 rounded-xl hover:bg-gray-200 cursor-pointer ">&deg;F</button>
            <img id="curr-location" class="bg-white py-2 px-3 w-11 rounded-lg invert hover:invert-0 hover:bg-gray-200 border border-gray-400 cursor-pointer " src="../assets/icons/location.svg" alt="">
            <a href="https://github.com/mayankrawat45/Clima" target="_blank"><img class="border border-gray-400 px-3 py-2 w-11 rounded-lg hover:bg-gray-200 cursor-pointer " src="../assets/icons/github.svg" alt=""></a>
        </div>
      </nav>
      <div id="broad" class="broadcast my-8 px-8 py-9 rounded-lg">
        <div class="flex justify-between">
            <div class="flex flex-col">
                <span class="text-2xl font-medium">--</span>
                <span >-</span>
                <span class="text-gray-500 text-sm">--</span>
            </div>
            <div>
                <section class="text-gray-400 text-[14px] px-3 py-1 border border-gray-400 rounded-xl">MM DD YY</section>
            </div>
        </div>
        <div class="mt-4 flex justify-between items-center"> 
            <div>
                <p class="text-6xl font-light">--&deg;</p>
                <p class="text-gray-600 text-sm">Feels like....</p>
            </div>
            <div class="w-22">
                <img class="clouds" src="https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png" alt="">
            </div>
        </div>
      </div>
      <div id="5d-broad" class="broadcast my-8 px-8 py-9 rounded-lg">   
        <h4 class="font-medium text-xl">5-day forcast</h4>
        
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
